<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- ============================================================
    CobreJá - ARQUIVO: registro-debito.html
    DESCRIÇÃO: Formulário para registrar um novo débito
    vinculado a um cliente já cadastrado.
    
    INTEGRAÇÃO COM BACKEND:
    - O select de clientes deve ser populado via GET /api/clientes
    - O formulário envia via POST para /api/debitos
    - Campos: cliente_debito, valor_debito, vencimento_debito,
      criacao_debito, descricao_debito
    ============================================================ -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CobreJá — Novo Débito</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar__logo">
                <div class="sidebar__logo-icone">
                    <img src="icone.webp" alt="CobreJá">
                </div>
                <div>
                    <h2 class="sidebar__titulo">CobreJá</h2>
                    <p class="sidebar__subtitulo">Gestão de Cobranças</p>
                </div>
            </div>
            <div class="sidebar__divisor"></div>
            <nav class="sidebar__nav">
                <a href="dashboard.html" class="sidebar__nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="clientes.html" class="sidebar__nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span>Clientes</span>
                </a>
                <a href="cadastro-cliente.html" class="sidebar__nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                    <span>Novo Cliente</span>
                </a>
                <a href="registro-debito.html" class="sidebar__nav-item sidebar__nav-item--ativo">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                    <span>Novo Débito</span>
                </a>
                <a href="contas-receber.html" class="sidebar__nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    <span>Contas a Receber</span>
                </a>
            </nav>
            <div class="sidebar__espacador"></div>
            <div class="sidebar__divisor"></div>
            <a href="index.html" class="sidebar__sair">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Sair do Sistema</span>
            </a>
        </aside>

        <div class="overlay" id="overlay" onclick="fecharMenu()"></div>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="conteudo-principal">

            <header class="header">
                <button class="header__menu-btn" onclick="toggleMenu()" aria-label="Abrir menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="header__info">
                    <p class="header__bemvindo">Bem-vindo(a) de volta</p>
                    <h3 class="header__nome">JPisa Distribuidora</h3>
                </div>
                <div class="header__avatar">JP</div>
            </header>

            <div class="conteudo-area">

                <div class="pagina-titulo-area">
                    <h1 class="titulo-pagina">Registrar Novo Débito</h1>
                    <p class="descricao-pagina">Vincule um débito a um cliente cadastrado</p>
                </div>

                <!-- 
                    FORMULÁRIO DE REGISTRO DE DÉBITO
                    action="#" → SUBSTITUIR por /api/debitos
                -->
                <form class="form-container" method="POST" action="#">

                    <!-- Linha 1: Cliente e Valor -->
                    <div class="form-row">
                        <div class="form-field">
                            <label class="form-label" for="cliente_debito">Cliente *</label>
                            <!-- 
                                SELECT: Lista de clientes cadastrados.
                                BACKEND: Deve ser populado dinamicamente via
                                GET /api/clientes retornando id e nome.
                            -->
                            <select 
                                id="cliente_debito" 
                                name="cliente_debito"
                                class="form-select"
                                required
                            >
                                <option value="">Carregando clientes...</option>
                            </select>
                        </div>
                        <div class="form-field">
                            <label class="form-label" for="valor_debito">Valor (R$) *</label>
                            <input 
                                type="number" 
                                id="valor_debito" 
                                name="valor_debito"
                                class="form-input"
                                placeholder="Ex: 350.00"
                                step="0.01"
                                min="0"
                                required
                            >
                        </div>
                    </div>

                    <!-- Linha 2: Datas -->
                    <div class="form-row">
                        <div class="form-field">
                            <label class="form-label" for="vencimento_debito">Data de Vencimento *</label>
                            <input 
                                type="date" 
                                id="vencimento_debito" 
                                name="vencimento_debito"
                                class="form-input"
                                required
                            >
                        </div>
                        <div class="form-field">
                            <label class="form-label" for="criacao_debito">Data de Criação</label>
                            <input 
                                type="date" 
                                id="criacao_debito" 
                                name="criacao_debito"
                                class="form-input"
                            >
                        </div>
                    </div>

                    <!-- Linha 3: Descrição -->
                    <div class="form-row">
                        <div class="form-field form-field--full">
                            <label class="form-label" for="descricao_debito">Descrição do Débito *</label>
                            <textarea 
                                id="descricao_debito" 
                                name="descricao_debito"
                                class="form-input form-textarea"
                                placeholder="Ex: Compra de arroz, feijão e óleo — Nota fiscal 12345"
                                rows="3"
                                required
                            ></textarea>
                        </div>
                    </div>

                    <!-- Botões -->
                    <div class="form-acoes">
                        <a href="contas-receber.html" class="btn-secundario">Cancelar</a>
                        <button type="button" class="btn-primario" onclick="salvarDebito()">
                            Registrar Débito
                        </button>
                    </div>

                </form>

            </div>

            <footer class="rodape">
                <p>CobreJá © 2026 — Projeto Integrador 1 — Univesp — Polo Jaú</p>
            </footer>

        </main>
    </div>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('sidebar--aberta'); document.getElementById('overlay').classList.toggle('overlay--visivel'); }
        function fecharMenu() { document.getElementById('sidebar').classList.remove('sidebar--aberta'); document.getElementById('overlay').classList.remove('overlay--visivel'); }

        // Preenche a data de criação com a data atual automaticamente
        document.getElementById('criacao_debito').value = new Date().toISOString().split('T')[0];

        /**
         * Simula o salvamento do débito.
         * BACKEND: Substituir por POST /api/debitos
         * com os dados: { clienteId, valor, dataVencimento, dataCriacao, descricao }
         */
        function salvarDebito() {
            var cliente = document.getElementById('cliente_debito').value;
            var valor = document.getElementById('valor_debito').value;
            var vencimento = document.getElementById('vencimento_debito').value;
            var descricao = document.getElementById('descricao_debito').value;

            if (!cliente || !valor || !vencimento || !descricao) {
                alert('Por favor, preencha os campos obrigatórios (*).');
                return;
            }

            alert('Débito registrado com sucesso!');
            window.location.href = 'contas-receber.html';
        }
    </script>

    <script src="js/api.js"></script>
    <script src="js/registro-debito.js"></script>
</body>
</html>
